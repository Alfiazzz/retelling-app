name: Build Frontend

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install and Build
        env:
          # ⚠️ ВАЖНО: Замени ссылку ниже на адрес своего бэкенда с Render.com!
          VITE_API_URL: https://retelling-app-backend.onrender.com
        run: cd frontend && npm install && npm run build
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: frontend/dist/
